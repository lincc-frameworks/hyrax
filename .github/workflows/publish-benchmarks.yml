# This workflow publishes the nightly benchmark results to GitHub Pages and the
# "benchmarks" branch. It is triggered after the benchmarks are computed in the
# asv-nightly workflow.
name: Publish nightly benchmarks

on:
  workflow_run:
    workflows: ["Run benchmarks nightly job"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish-benchmarks-nightly:
    runs-on: ubuntu-latest
    # if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Download benchmark HTML artifact
      continue-on-error: true
      uses: dawidd6/action-download-artifact@v21
      with:
        name: benchmark-html
        run_id: 29868560196
        path: benchmarks/_html
    - name: Debug benchmark directory
      run: |
        pwd
        ls -la
        find benchmarks -maxdepth 3
    - name: Deploy dashboard to GitHub Pages
      if: ${{ hashFiles('benchmarks/_html/**') != '' }}
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: benchmarks/_html
    - name: Download benchmark results artifact
      continue-on-error: true
      uses: dawidd6/action-download-artifact@v21
      with:
        name: benchmark-results
        run_id: 29868560196
        path: benchmarks/_results
    - name: Submit new results to "benchmarks" branch
      if: ${{ hashFiles('benchmarks/_results/**') != '' }}
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: benchmarks
        folder: benchmarks/_results
        target-folder: _results

# This workflow will setup the environment and run the benchmarking test.

name: Runtime Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v7

      # remove python setup, just using the one provided in conda env (3.12.13)
      # - name: Set up Python
      #   uses: actions/setup-python@v6
      #   with:
      #     python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create fresh virtual environment
        run: |
          uv venv .venv --python 3.12

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e .[dev]
          if [ -f requirements.txt ]; then uv pip install -r requirements.txt; fi

      - name: Run benchmark
        run: |
          source .venv/bin/activate

          # path to downloaded cifar dataset
          export CIFAR_DIR="/astro/store/shiren/wqy37/datasets"

          python benchmarks/run_timebench.py

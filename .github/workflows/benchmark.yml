# This workflow will setup the environment and run the benchmarking test.

name: Runtime Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create fresh virtual environment
        run: |
          # clean up venv to test without uv cache
          rm -rf .venv
          uv venv .venv --python 3.12

      - name: Install dependencies
        run: |
          uv pip install --python .venv/bin/python -e ".[dev]"
          if [ -f requirements.txt ]; then uv pip install --python .venv/bin/python -r requirements.txt; fi

      - name: Run benchmark
        run: |
          source .venv/bin/activate

          # path to downloaded cifar dataset
          export CIFAR_DIR="/astro/store/shiren/wqy37/datasets"

          python benchmarks/run_timebench.py

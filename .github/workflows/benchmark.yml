# This workflow will setup the environment and run the benchmarking test.

name: Runtime Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout main branch of the repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create fresh virtual environment
        run: |
          # clean up venv
          rm -rf .venv
          uv venv .venv --python 3.12

      - name: Install dependencies
        run: |
          uv pip install --python .venv/bin/python -e ".[dev]"
          if [ -f requirements.txt ]; then uv pip install --python .venv/bin/python -r requirements.txt; fi

      - name: Run benchmark
        id: benchmark
        run: |
          source .venv/bin/activate

          # path to downloaded cifar dataset
          export CIFAR_DIR="/astro/store/shiren/wqy37/datasets"

          # path for saving the result
          export RESULT_PATH="/astro/store/shiren/wqy37/results"

          OUTPUT=$(python benchmarks/run_timebench.py)
          RESULT_FILE=$(echo "$OUTPUT" | grep '^RESULT_FILE=' | cut -d= -f2-)
          echo "result_file=$RESULT_FILE" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout benchmarks branch
        run: |
          if git ls-remote --exit-code origin benchmarks >/dev/null 2>&1; then
            git fetch origin benchmarks:refs/remotes/origin/benchmarks
            git checkout -B benchmarks origin/benchmarks
          fi

      - name: Publish benchmark results to benchmarks branch
        run: |
          mkdir -p gondor_results
          cp "${{ steps.benchmark.outputs.result_file }}" gondor_results/

          # check if copied any files
          if [ -z "$(find gondor_results -maxdepth 1 -type f -name '*.json' 2>/dev/null)" ]; then
            echo "No benchmark result JSON files were found to publish."
            exit 0
          fi

          git add gondor_results
          if git diff --cached --quiet; then
            echo "No new benchmark results to publish."
            exit 0
          fi

          git commit -m "Add custom benchmark results"
          git push origin benchmarks
